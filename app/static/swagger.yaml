swagger: "2.0"

info:
  title: "Mechanic Shop API"
  description: "This is an API to manage a mechanic shop"
  version: "1.0.0"

host: "127.0.0.1:5000"

schemes:
  - "http"

consumes:
  - "application/json"

produces:
  - "application/json"

# =========================
# SECURITY
# =========================

securityDefinitions:
  bearerAuth:
    type: apiKey
    name: Authorization
    in: header

# =========================
# PATHS
# =========================

paths:
  /customers/login:
    post:
      tags:
        - Customers
      summary: "Login endpoint (generates token)"
      description: "Validates customer credentials and returns a token"

      parameters:
        - in: body
          name: body
          required: true
          schema:
            $ref: "#/definitions/LoginCredentials"

      responses:
        200:
          description: "Login successful"
          schema:
            $ref: "#/definitions/LoginResponse"
  ## customers
  /customers:
    post:
      tags:
        - Customers
      summary: "Create a new customer"
      description: "Register a new customer"

      parameters:
        - in: body
          name: body
          required: true
          schema:
            $ref: "#/definitions/CreateCustomerPayload"

      responses:
        201:
          description: "Customer created successfully"
          schema:
            $ref: "#/definitions/CreateCustomerResponse"

    get:
      tags:
        - Customers
      summary: "Get all customers"
      description: "Retrieve all customers"

      responses:
        200:
          description: "Retrieved customers successfully"
          schema:
            $ref: "#/definitions/AllCustomers"

    put:
      tags:
        - Customers
      summary: "Update customer"
      description: "Update a customer (requires token)"

      security:
        - bearerAuth: []

      parameters:
        - in: body
          name: body
          required: true
          schema:
            $ref: "#/definitions/UpdateCustomerPayload"

      responses:
        200:
          description: "Customer updated successfully"
          schema:
            $ref: "#/definitions/UpdateCustomerResponse"

    delete:
      tags:
        - Customers
      summary: "Delete customer"
      description: "Delete a customer (requires token)"

      security:
        - bearerAuth: []

      responses:
        200:
          description: "Customer deleted successfully"
          schema:
            $ref: "#/definitions/DeleteCustomerResponse"
  ## mechanic
  /mechanics:
    post:
      tags:
        - Mechanics
      summary: "Create a new mechanic"
      description: "Add a new mechanic to the system"

      parameters:
        - in: body
          name: body
          required: true
          schema:
            $ref: "#/definitions/CreateMechanicPayload"

      responses:
        201:
          description: "Mechanic created successfully"
          schema:
            $ref: "#/definitions/CreateMechanicResponse"

    get:
      tags:
        - Mechanics
      summary: "Get all mechanic"
      description: "Retrieve all mechanics"

      responses:
        200:
          description: "Retrieved mechanics successfully"
          schema:
            $ref: "#/definitions/AllMechanic"

    put:
      tags:
        - Mechanics
      summary: "Update mechanic"
      description: "Update a mechanic (requires token)"

      security:
        - bearerAuth: []

      parameters:
        - in: body
          name: body
          required: true
          schema:
            $ref: "#/definitions/UpdateMechanicPayload"

      responses:
        200:
          description: "Mechanic updated successfully"
          schema:
            $ref: "#/definitions/UpdateMechanicResponse"

    delete:
      tags:
        - Mechanics
      summary: "Delete mechanic"
      description: "Delete a mechanic (requires token)"

      security:
        - bearerAuth: []

      responses:
        200:
          description: "Mechanic deleted successfully"
          schema:
            $ref: "#/definitions/DeleteMechanicResponse"

  ## tickets
  /tickets:
    post:
      tags:
        - Tickets
      summary: "Create a new ticket"
      description: "Add a service ticket for a customer"

      parameters:
        - in: body
          name: body
          description: "Ticket data"
          required: true
          schema:
            $ref: "#/definitions/CreateTicketPayload"

      responses:
        201:
          description: "Ticket created successfully"
          schema:
            $ref: "#/definitions/CreateTicketResponse"

    get:
      tags:
        - Tickets
      summary: "Get all tickets"
      description: "Retrieve all tickets"

      responses:
        200:
          description: "Retrieved tickets successfully"
          schema:
            $ref: "#/definitions/AllTickets"

    put:
      tags:
        - Tickets
      summary: "Update ticket"
      description: "Update a ticket (requires authentication)"

      security:
        - bearerAuth: []

      parameters:
        - in: body
          name: body
          description: "Updated ticket data"
          required: true
          schema:
            $ref: "#/definitions/UpdateTicketPayload"

      responses:
        200:
          description: "Ticket updated successfully"
          schema:
            $ref: "#/definitions/UpdateTicketResponse"

    delete:
      tags:
        - Tickets
      summary: "Delete ticket"
      description: "Delete a ticket (requires authentication)"

      security:
        - bearerAuth: []

      responses:
        200:
          description: "Ticket deleted successfully"
          schema:
            $ref: "#/definitions/DeleteTicketResponse"

  ## inventory

  /inventory:
    post:
      tags:
        - Inventory
      summary: "Create inventory item"
      description: "Add a new item to inventory"

      parameters:
        - in: body
          name: body
          description: "inventory data"
          required: true
          schema:
            $ref: "#/definitions/CreateInventoryPayload"

      responses:
        201:
          description: "inventory created successfully"
          schema:
            $ref: "#/definitions/CreateInventoryResponse"

    get:
      tags:
        - Inventory
      summary: "Get all inventory"
      description: "Retrieve all inventory items"

      responses:
        200:
          description: "Retrieved inventory successfully"
          schema:
            $ref: "#/definitions/AllInventory"

    put:
      tags:
        - Inventory
      summary: "Update inventory item"
      description: "Update an inventory item (requires authentication)"

      security:
        - bearerAuth: []

      parameters:
        - in: body
          name: body
          description: "Updated inventory data"
          required: true
          schema:
            $ref: "#/definitions/UpdateInventoryPayload"

      responses:
        200:
          description: "Inventory updated successfully"
          schema:
            $ref: "#/definitions/UpdateInventoryResponse"

  /inventory/{part_id}:
    delete:
      tags:
        - Inventory
      summary: "Delete inventory item"
      description: "Delete an inventory item (requires authentication)"

      security:
        - bearerAuth: []

      parameters:
        - in: path
          name: part_id
          required: true
          type: integer
          description: " ID of the inventory item"

      responses:
        200:
          description: "Inventory deleted successfully"
          schema:
            $ref: "#/definitions/DeleteInventoryResponse"

# =========================
# DEFINITIONS
# =========================
#Customers
definitions:
  # ---------- LOGIN ----------
  LoginCredentials:
    type: "object"
    properties:
      email:
        type: "string"
      password:
        type: "string"
    required:
      - email
      - password

  LoginResponse:
    type: "object"
    properties:
      token:
        type: "string"
      message:
        type: "string"

  # ---------- CREATE ----------
  CreateCustomerPayload:
    type: "object"
    properties:
      name:
        type: "string"
      email:
        type: "string"
      phone:
        type: "string"
      password:
        type: "string"
    required:
      - name
      - email
      - phone
      - password

  CreateCustomerResponse:
    type: "object"
    properties:
      id:
        type: "integer"
      name:
        type: "string"
      email:
        type: "string"
      phone:
        type: "string"

  # ---------- GET ----------
  AllCustomers:
    type: "array"
    items:
      type: "object"
      properties:
        id:
          type: "integer"
        name:
          type: "string"
        email:
          type: "string"
        phone:
          type: "string"

  # ---------- UPDATE ----------
  UpdateCustomerPayload:
